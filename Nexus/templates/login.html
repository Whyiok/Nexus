{% extends 'base.html' %}

{% block title %}
Вход
{% endblock %}


{% block main %}
<main style="margin-top: 10rem;">
    <div class="container">
        <div class="d-flex row justify-content-center text-center">
            <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
                aria-labelledby="staticBackdropLabel" aria-hidden="true" {% if show_modal %} data-bs-show="true" {%
                endif %}>
                <div class="modal-dialog">
                    <div class="modal-content" style="border-radius: 15px; background: rgba(10, 10, 20, 0.75);">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5 font" id="staticBackdropLabel">Мы отправили код на почту {{
                                email }}
                            </h1>
                        </div>
                        <form method="post" action="/login">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <div class="modal-body">
                                <!-- Код подтверждения -->
                                <p class="font">Введите 6-значный код</p>
                                <div style="margin-bottom: 20px;" class="input-div">
                                    <input type="text" placeholder="6-значный код" name="verify_code"
                                        class="input font">
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn-glass btn-glass-outline font" data-bs-dismiss="modal">
                                    Закрыть
                                </button>
                                <button type="submit" class="btn-glass btn-glass-primary font">Отправить</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                <!-- Карточка входа -->
                <div
                    style="background: rgba(10, 10, 20, 0.75); backdrop-filter: blur(15px); border: 1px solid rgba(111, 66, 193, 0.3); border-radius: 30px; padding: 40px;">
                    <!-- Заголовок -->
                    <div class="text-center mb-4">
                        <span class="font-classic ms-2"
                            style="background: linear-gradient(45deg, #6f42c1, #a855f7, #d946ef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-size: 2rem; user-select: none;">ВХОД</span>
                    </div>

                    <form method="POST" action="/send_email" data-type="login"> 
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <!-- Email -->
                        <div style="margin-bottom: 20px;">
                            <div class="input-div">
                                <img src="/static/user.svg"
                                    style="width: 18px; height: 18px; margin-right: 10px; filter: brightness(0) invert(1); opacity: 0.7;">
                                <input type="email" id="email" name="email" class="font input" placeholder="Email"
                                    required title="Email">
                            </div>
                        </div>

                        <!-- Пароль -->
                        <div style="margin-bottom: 30px;">
                            <div class="input-div">
                                <img src="/static/password.svg"
                                    style="width: 18px; height: 18px; margin-right: 10px; filter: brightness(0) invert(1); opacity: 0.7;">
                                <input type="password" id="password" name="password" class="font input"
                                    placeholder="Пароль" required title="Пароль">
                            </div>
                            <li><a class="dropdown-item pt-2 mt-2" href="/forgot_password">Забыли пароль?</a></li>
                        </div>

                        <!-- Кнопка входа -->
                        <div class="text-center">
                            <button type="submit" id="registerBtn"
                                class="btn-glass btn-glass-primary font d-inline-flex align-items-center justify-content-center"
                                style="width: 150px; font-size: 1.1rem; margin-bottom: 25px;">
                                Войти
                            </button>
                        </div>


                        <!-- Ссылка на регистрацию -->
                        <div style="text-align: center;" class="nav-item">
                            <p style="color: rgba(255,255,255,0.6);">Нет аккаунта?</p>
                            <a href="/register" class="nav-link-glass font"
                                style="display: inline-flex; align-items: center; padding: 12px 25px;">
                                <img src="/static/register.svg"
                                    style="margin-right: 8px; height: 18px; filter: brightness(0) invert(1);">
                                Регистрация
                                <span class="nav-indicator"></span>
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<style>
    /* Эффект при фокусе на полях ввода */
    .form-control:focus+div {
        border-color: #6f42c1;
        box-shadow: 0 0 15px rgba(111, 66, 193, 0.3);
    }
</style>
{% endblock %}
