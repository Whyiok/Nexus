{% extends 'base.html' %}

{% block title %}
Добавить дискуссию
{% endblock %}

{% block main %}
<main style="margin-top: 25px;">
    <div class="nav col-auto mb-2 justify-content-center mb-md-0 p-2" style="margin-top: 80px;">
        <a class="btn-glass btn-glass-outline font p-0 dropdown btn"
           style="
                        position: absolute;
                        right: 20px;
                        top: 85px;
                        width: 44px;
                        height: 44px;
                        background-image: url(/static/info.svg);
                        background-size: 20px;
                        background-repeat: no-repeat;
                        background-position: center;
                        border-radius: 50%;"

           data-bs-toggle="popover" data-bs-title="Правила"
           data-bs-html="true"
           data-bs-content="1. Тема всех постов должна относиться к игре Minecraft.&lt;br&gt;
                            2. Нецензурные слова запрещены.&lt;br&gt;
                            3. Вставки ссылок на другие ресурсы с целью рекламы запрещены.">
        </a>
    </div>
    <!-- Форма загрузки -->
    <div class="mb-5 fixed" style="
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 15px;
    ">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="m-3 w-25 col-auto">
                <label class="form-label btn-glass btn-glass-primary font"
                       style="color: white; font-weight: 500; width: 9.7rem; padding-left: auto;">Заголовок</label>
                <input type="text" name="title" class="btn-glass btn-glass-outline" style="width: 500px;" maxlength="80"
                       required>
            </div>

            <div class="m-3 w-25 col-auto">
                <label class="form-label btn-glass btn-glass-primary font"
                       style="color: white; font-weight: 500; width: 150px; padding-left: 50px;">Текст</label>
                <input type="text" name="text" class="btn-glass btn-glass-outline"
                       style="width: 500px;" required>
            </div>

            <button type="submit" class="btn-glass btn-glass-primary mt-3 font mx-auto">
                Опубликовать
            </button>

        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const fileLabel = document.querySelector('label[for="fileInput"]');

            if (fileLabel) {
                // Отслеживаем клик по label
                fileLabel.addEventListener('click', function() {
                    console.log('Клик по кнопке выбора файла');
                });
            }

            // А сам input отслеживаем на изменение
            const fileInput = document.getElementById('fileInput');
            if (fileInput) {
                fileInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        // Создаем flash-сообщение
                        const flash = document.createElement('div');
                        flash.className = 'alert alert-success';
                        flash.style.position = 'fixed';
                        flash.style.top = '80px';
                        flash.style.right = '20px';
                        flash.style.zIndex = '9999';
                        flash.innerHTML = `✅ Файл "${file.name}" выбран`;

                        document.body.appendChild(flash);

                        setTimeout(() => flash.remove(), 3000);
                    }
                });
            }
        });
    </script>
</main>
{% endblock %}
