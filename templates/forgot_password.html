{% extends 'base.html' %}

{% block title %}
Вход
{% endblock %}

{% block menu %}
<li class="nav-item">
    <a href="/login" class="nav-link-glass active">
        <img src="/static/login.svg" style="margin-right: 5px; width: 18px; height: 18px;">
        Вход
        <span class="nav-indicator"></span>
    </a>
</li>
{% endblock %}

{% block main %}
<main style="margin-top: 10rem;">
    <div class="container">
        <div class="d-flex row justify-content-center text-center">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                <!-- Карточка входа -->
                <div
                    style="background: rgba(10, 10, 20, 0.75); backdrop-filter: blur(15px); border: 1px solid rgba(111, 66, 193, 0.3); border-radius: 30px; padding: 40px;">

                    <!-- Заголовок -->
                    <div class="text-center mb-4">
                        <span class="font-classic ms-2"
                            style="background: linear-gradient(45deg, #6f42c1, #a855f7, #d946ef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-size: 2rem; user-select: none;">ВОССТАНОВЛЕНИЕ</span>
                    </div>

                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <!-- Email -->
                        <div style="margin-bottom: 20px;">
                            <div class="input-div">
                                <img src="/static/user.svg"
                                    style="width: 18px; height: 18px; margin-right: 10px; filter: brightness(0) invert(1); opacity: 0.7;">
                                <input type="email" id="email" name="email" class="font input" placeholder="Email"
                                    required title="Email">
                            </div>
                        </div>
                        <!-- Кнопка входа -->
                        <div class="text-center">
                            <button type="submit"
                                class="btn-glass btn-glass-primary font d-inline-flex align-items-center justify-content-center"
                                style="width: 200px; padding: 15px; font-size: 1.1rem; margin-bottom: 25px;">
                                Восстановить
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<style>
    /* Эффект при фокусе на полях ввода */
    .form-control:focus+div {
        border-color: #6f42c1;
        box-shadow: 0 0 15px rgba(111, 66, 193, 0.3);
    }
</style>
{% endblock %}
