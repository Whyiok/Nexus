{% extends 'base.html' %}

{% block main %}
<div class="container" style="margin-top: 150px;">
    <h3>Пользователи:</h3>

    {% for user in users %}
    <div class="card mb-2">
        <div class="card-body">
            <small class="text-muted">ID: {{ user[1] }}</small>
            <strong>{{ user[0] }}</strong>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
