{% extends 'base.html' %}

{% block title %}
Добавить сервер
{% endblock %}

{% block main %}
<main style="margin-top: 25px;">
    <!-- Категории -->
    <div class="nav col-auto mb-2 justify-content-center mb-md-0 p-2" style="margin-top: 1rem;">
        <p class="display-5  fw-bold font"
           style="background: linear-gradient(45deg, #6f42c1, #a855f7, #d946ef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-size: 4rem; user-select: none;">
            Создайте сервер</p>
    </div>

    <!-- Форма загрузки -->
    <div class="mb-5 fixed" style="
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 15px;
    ">
        <form method="POST" enctype="multipart/form-data">
            <div class="m-3 w-25 col-auto">
                <label class="form-label btn-glass btn-glass-primary font"
                       style="color: white; font-weight: 500; width: 9.7rem; padding-left: auto;">Заголовок</label>
                <input type="text" name="title" class="btn-glass btn-glass-outline" style="width: 500px;" maxlength="80"
                       required>
            </div>

            <div class="m-3 w-25 col-auto">
                <label class="form-label btn-glass btn-glass-primary font"
                       style="color: white; font-weight: 500; width: 150px; padding-left: 30px;">Картинка</label>
                <div class="file-input-wrapper" style="width: 300px;">
                    <input type="file" name="image" accept="image/*" id="fileInput" style="display: none;">
                    <label for="fileInput" class="btn-glass btn-glass-outline font"
                           style="width: 100%; justify-content: center; cursor: pointer;">
                        Выберите файл
                    </label>
                </div>
            </div>

            <div class="m-3 w-25 col-auto">
                <label class="form-label btn-glass btn-glass-primary font"
                       style="color: white; font-weight: 500; width: 150px; padding-left: 50px;">Текст</label>
                <input type="text" name="text" class="btn-glass btn-glass-outline"
                       style="width: 500px;" required>
            </div>
            <div class="m-3 w-25 col-auto">
                <label class="form-label btn-glass btn-glass-primary font"
                       style="color: white; font-weight: 500; width: 150px; padding-left: 50px;">Ip Сервера</label>
                <input type="text" name="ip" class="btn-glass btn-glass-outline"
                       style="width: 500px;" required>
            </div>
            <div class="dropdown my-2 btn-glass btn-glass-outline" style="height: 3rem; padding: auto;">
                <div class="form-check">
                    <input class="form-check-input" name="categories" type="checkbox" value="building">
                    <label class="form-check-label">
                        Строительство
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" name="categories" type="checkbox" value="pvp">
                    <label class="form-check-label">
                        PvP
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" name="categories" type="checkbox" value="redstone">
                    <label class="form-check-label">
                        Редстоун
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" name="categories" type="checkbox" value="challenge">
                    <label class="form-check-label">
                        Челленджи
                    </label>
                </div>
            </div>

            <button type="submit" class="btn-glass btn-glass-primary mt-3 font mx-auto">
                Опубликовать
            </button>

        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const fileLabel = document.querySelector('label[for="fileInput"]');

            if (fileLabel) {
                // Отслеживаем клик по label
                fileLabel.addEventListener('click', function() {
                    console.log('Клик по кнопке выбора файла');
                });
            }

            // А сам input отслеживаем на изменение
            const fileInput = document.getElementById('fileInput');
            if (fileInput) {
                fileInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        // Создаем flash-сообщение
                        const flash = document.createElement('div');
                        flash.className = 'alert alert-success';
                        flash.style.position = 'fixed';
                        flash.style.top = '80px';
                        flash.style.right = '20px';
                        flash.style.zIndex = '9999';
                        flash.innerHTML = `✅ Файл "${file.name}" выбран`;

                        document.body.appendChild(flash);

                        setTimeout(() => flash.remove(), 3000);
                    }
                });
            }
        });
    </script>
</main>
{% endblock %}
